services:

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: airflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  airflow-init:
#    image: apache/airflow:2.8.1
    build: ./airflow
    container_name: airflow-init
    depends_on:
      - postgres
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow_db
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
#      AIRFLOW__WEBSERVER__SECRET_KEY: this_is_unsafe_but_consistent

    entrypoint: bash
    command: -c "airflow db migrate && airflow users create --username admin --password admin --firstname admin --lastname admin --role Admin --email admin@example.com"

  airflow-webserver:
#    image: apache/airflow:2.8.1
    build: ./airflow
    container_name: airflow-webserver
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow_db
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: this_is_unsafe_but_consistent
#      AIRFLOW__LOGGING__REMOTE_LOGGING: "False"
    ports:
      - "8080:8080"
    command: webserver
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock

  airflow-scheduler:
#    image: apache/airflow:2.8.1
    build: ./airflow
    container_name: airflow-scheduler
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow_db
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: this_is_unsafe_but_consistent
#      AIRFLOW__LOGGING__REMOTE_LOGGING: "False"
    command: scheduler
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock


  spark-master:
    image: docker.io/bitnamilegacy/spark:3.5
    container_name: spark-master
    user: "0:0"
    environment:
      - HADOOP_USER_NAME=spark
      - USER=spark
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - HOME=/tmp
      - IVY_HOME=/tmp/.ivy2
      - SPARK_LOCAL_DIRS=/tmp
      - SPARK_CONF_DIR=/opt/bitnami/spark/conf
      - SPARK_HOME=/opt/bitnami/spark
      - SPARK_SUBMIT_OPTS=-Divy.home=/tmp/.ivy2
#      - POSTGRES_JDBC_VERSION=42.7.3

    ports:
      - "8081:8080"
      - "7077:7077"
    volumes:
      - spark_tmp:/tmp
      - ./jars/postgresql-42.7.3.jar:/opt/bitnami/spark/jars/postgresql-42.7.3.jar
      - ./spark/jobs:/opt/bitnami/spark/jobs

  spark-worker-1:
    image: docker.io/bitnamilegacy/spark:3.5
    container_name: spark-worker-1
    user: "0:0"
    environment:
      - HADOOP_USER_NAME=spark
      - USER=spark
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=1G
      - SPARK_WORKER_CORES=1
      - HOME=/tmp
      - IVY_HOME=/tmp/.ivy2
      - SPARK_LOCAL_DIRS=/tmp
      - SPARK_CONF_DIR=/opt/bitnami/spark/conf
      - SPARK_HOME=/opt/bitnami/spark
      - SPARK_SUBMIT_OPTS=-Divy.home=/tmp/.ivy2

    depends_on:
      - spark-master

    volumes:
      - spark_tmp:/tmp
      - ./jars/postgresql-42.7.3.jar:/opt/bitnami/spark/jars/postgresql-42.7.3.jar
      - ./spark/jobs:/opt/bitnami/spark/jobs

  spark-worker-2:
    image: docker.io/bitnamilegacy/spark:3.5
    container_name: spark-worker-2
    user: "0:0"
    environment:
      - HADOOP_USER_NAME=spark
      - USER=spark
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=1G
      - SPARK_WORKER_CORES=1
      - HOME=/tmp
      - IVY_HOME=/tmp/.ivy2
      - SPARK_LOCAL_DIRS=/tmp
      - SPARK_CONF_DIR=/opt/bitnami/spark/conf
      - SPARK_HOME=/opt/bitnami/spark
      - SPARK_SUBMIT_OPTS=-Divy.home=/tmp/.ivy2
#      - POSTGRES_JDBC_VERSION=42.7.3

    depends_on:
      - spark-master

    volumes:
      - spark_tmp:/tmp
      - ./jars/postgresql-42.7.3.jar:/opt/bitnami/spark/jars/postgresql-42.7.3.jar
      - ./spark/jobs:/opt/bitnami/spark/jobs


  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: airflow_db
      MB_DB_PORT: 5432
      MB_DB_USER: postgres
      MB_DB_PASS: postgres
      MB_DB_HOST: postgres
    depends_on:
      - postgres

volumes:
  postgres_data:
  metabase_data:
  spark_tmp:
